<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroHawk | Generador QR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-24 -left-24 w-72 h-72 bg-sky-300/25 blur-3xl rounded-full"></div>
    <div class="absolute top-1/3 -right-24 w-80 h-80 bg-blue-300/20 blur-3xl rounded-full"></div>
    <div class="absolute bottom-0 left-1/3 w-96 h-96 bg-cyan-200/20 blur-3xl rounded-full"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(14,165,233,.14),transparent_24%),radial-gradient(circle_at_bottom_left,rgba(59,130,246,.12),transparent_26%),linear-gradient(to_bottom,#f8fbff,#eef6ff,#f8fbff)]"></div>
  </div>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-12 md:py-20">
    <div class="rounded-[2rem] bg-white/80 backdrop-blur-xl border border-white shadow-[0_18px_45px_rgba(37,99,235,0.12)] p-8 md:p-10">
      <div class="text-center">
        <img src="assets/img/logo.png" alt="Logo HydroHawk" class="w-24 h-24 mx-auto object-contain drop-shadow-xl">
        <p class="mt-4 text-sky-600 text-sm uppercase tracking-[0.25em] font-semibold">HydroHawk</p>
        <h1 class="mt-3 text-3xl md:text-4xl font-bold text-slate-900">Código QR del proyecto</h1>
        <p class="mt-4 text-slate-600 max-w-2xl mx-auto">
          Escanea este código QR para abrir directamente el portal web del proyecto.
        </p>
      </div>

      <div class="mt-10 grid lg:grid-cols-2 gap-8 items-center">
        <div class="rounded-3xl bg-gradient-to-br from-sky-50 to-white border border-sky-100 p-6 shadow-sm">
          <label for="urlInput" class="block text-sm font-semibold text-slate-700 mb-2">URL pública del proyecto</label>
          <input
            id="urlInput"
            type="text"
            class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none focus:border-sky-400"
            value="https://TU-USUARIO.github.io/NOMBRE-DEL-REPOSITORIO/"
          />

          <div class="mt-5 flex flex-wrap gap-3">
            <button id="generateBtn" class="px-5 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 text-white font-semibold">
              Generar QR
            </button>
            <button id="downloadBtn" class="px-5 py-3 rounded-2xl border border-slate-300 bg-white hover:bg-slate-50 font-semibold">
              Descargar QR
            </button>
          </div>

          <p class="mt-4 text-sm text-slate-500">
            Cambia la URL por la de tu GitHub Pages y luego genera el QR.
          </p>
        </div>

        <div class="rounded-3xl bg-white border border-slate-200 p-6 shadow-sm flex flex-col items-center justify-center min-h-[360px]">
          <div id="qrcode" class="bg-white p-4 rounded-2xl shadow-sm"></div>
          <p id="statusText" class="mt-4 text-sm text-slate-500 text-center">
            Aquí aparecerá tu código QR.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const urlInput = document.getElementById("urlInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const qrContainer = document.getElementById("qrcode");
    const statusText = document.getElementById("statusText");

    function clearQR() {
      qrContainer.innerHTML = "";
    }

    function generateQR() {
      const url = urlInput.value.trim();

      if (!url) {
        statusText.textContent = "Escribe una URL válida.";
        return;
      }

      clearQR();

      new QRCode(qrContainer, {
        text: url,
        width: 240,
        height: 240
      });

      statusText.textContent = "QR generado correctamente.";
    }

    function downloadQR() {
      const img = qrContainer.querySelector("img");
      const canvas = qrContainer.querySelector("canvas");

      if (!img && !canvas) {
        statusText.textContent = "Primero genera el QR.";
        return;
      }

      let dataUrl = "";

      if (img) {
        dataUrl = img.src;
      } else {
        dataUrl = canvas.toDataURL("image/png");
      }

      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = "qr-hydrohawk.png";
      link.click();
    }

    generateBtn.addEventListener("click", generateQR);
    downloadBtn.addEventListener("click", downloadQR);

    window.addEventListener("load", generateQR);
  </script>
</body>
</html>
